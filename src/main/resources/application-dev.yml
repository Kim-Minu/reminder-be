spring:
  jackson:
    deserialization:
      fail-on-null-for-primitives: false
  datasource:
    url: jdbc:mariadb://localhost:3306/reminders_app
    username: root
    password: qwerty0922
    driver-class-name: org.mariadb.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 5
  jpa:
